<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AJR Contabilidade | Assessoria & Consultoria</title>
    <link id="favicon" rel="icon" type="image/jpeg" href="https://pbs.twimg.com/media/HGJIzXZWQAAKRf2?format=jpg&name=4096x4096" />
    <script>
      // Script para remover o fundo branco do favicon dinamicamente
      (function() {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = "https://pbs.twimg.com/media/HGJIzXZWQAAKRf2?format=jpg&name=4096x4096";
        img.onload = function() {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = imageData.data;
          
          // Transparência para pixels brancos ou quase brancos
          for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i+1];
            const b = data[i+2];
            // Se for muito claro, torna transparente
            if (r > 230 && g > 230 && b > 230) {
              data[i+3] = 0;
            }
          }
          
          ctx.putImageData(imageData, 0, 0);
          const favicon = document.getElementById('favicon');
          favicon.href = canvas.toDataURL('image/png');
          favicon.type = 'image/png';
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
